    // Invertimos el orden para que Lunes salga arriba en el gráfico
    const yLabels = [...daysOrder].reverse(); 
    const xLabels = Array.from({length: 24}, (_, i) => i); // Horas 0 a 23

    // Inicializar matrices vacías para z (valores) y text (hover)
    let zMatrix = Array(7).fill().map(() => Array(24).fill(0));
    let textMatrix = Array(7).fill().map(() => Array(24).fill(''));

    // Rellenar matrices
    rawData.forEach(item => {
        const dayIndex = yLabels.indexOf(item.Dia);
        const hourIndex = item.Hora;
        if (dayIndex !== -1) {
            zMatrix[dayIndex][hourIndex] = item.Incidentes;
            // Crear texto informativo para el hover
            textMatrix[dayIndex][hourIndex] = 
                `<b>Día:</b> ${item.Dia.charAt(0).toUpperCase() + item.Dia.slice(1)}<br>` +
                `<b>Hora:</b> ${item.Hora}:00h<br>` +
                `<b>Incidentes:</b> ${item.Incidentes}<br>` +
                `<b>Porcentaje:</b> ${item.Porcentaje.toFixed(2)}%`;
        }
    });

    // 3. Definir la paleta categórica basada en las imágenes proporcionadas
    const categoricalPalette = [
    [0.00, '#f3e7c2'],
    [0.15, '#f0d88a'],
    [0.35, '#f5b041'],
    [0.55, '#f57c3d'],
    [0.75, '#ff3d2e'],
    [1.00, '#99002b']
];

    // 4. Configuración del rastro del Heatmap
    const data = [{
        x: xLabels,
        y: yLabels,
        z: zMatrix,
        text: textMatrix, // Datos para mostrar al pasar el mouse
        hoverinfo: 'text', // Mostrar solo el texto personalizado
        type: 'heatmap',
        colorscale: categoricalPalette, // Aplicar la nueva paleta categórica
        showscale: true, // Mostrar la barra de escala de colores
        colorbar: {
            title: 'Nº Incidentes',
            titleside: 'right'
        }
    }];

    // 5. Configuración del diseño (Layout)
    const layout = {
        xaxis: {
            title: 'Hora del Día',
            tickmode: 'linear',
            dtick: 1,
            range: [-0.5, 23.5]
        },
        yaxis: {
            tickmode: 'array',
            tickvals: yLabels,
            ticktext: yLabels.map(d => d.charAt(0).toUpperCase() + d.slice(1)) // Capitalizar nombres
        },
        margins: { l: 100, r: 50, b: 50, t: 30 },
        height: 550,
        backgroundColor: { fill: 'transparent' }
    };

    // 6. Dibujar el gráfico
    Plotly.newPlot('heatmap', data, layout, {responsive: true});
