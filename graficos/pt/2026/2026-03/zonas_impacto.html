<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonas de Mayor Impacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #grafico-contenedor { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="grafico-contenedor"></div>
    <script>
        var chartDom = document.getElementById('grafico-contenedor');
        var myChart = echarts.init(chartDom);

        var etiquetas = ['Comuna 1', 'Comuna 14', 'Comuna 15', 'Comuna 4'];
        
        var valores = [255, 167, 159, 157];

        var option = {

            baseOption: {
                color: ['#0B192C'],
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(255, 255, 255, 0.9)',
                    textStyle: { color: '#1f2937', fontFamily: 'Inter' }
                },

                xAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: '#E6E9EB', type: 'dashed' } },
                    axisLabel: { fontFamily: 'Inter', color: '#64748b' }
                },

                yAxis: {
                    type: 'category',
                    data: etiquetas,
                    inverse: true,
                    axisLabel: { fontFamily: 'Inter', color: '#1f2937', fontWeight: '600' },
                    axisLine: { show: false },
                    axisTick: { show: false }
                },
                series: [{
                    name: 'Incidentes',
                    type: 'bar',
                    data: valores,
                    barWidth: '50%',
                    itemStyle: {
                        borderRadius: [0, 4, 4, 0]
                    },
                    label: { 
                        show: true, 
                        position: 'right',
                        formatter: '{c}', 
                        fontFamily: 'Inter', 
                        fontSize: 12, 
                        color: '#0B192C',
                        fontWeight: '600'
                    }
                }]
            },
            media: [
                {
                    query: { minWidth: 500 },
                    option: {
                        title: { show: true, text: 'Zonas de Mayor Impacto', left: '2%', top: '5%', textStyle: { color: '#4b5563', fontSize: 16 } },
                        graphic: { elements: [{ type: 'image', style: { image: 'https://i.imgur.com/GXTFolo.png', width: 140, height: 40 }, right: '5%', top: '4%' }] },
                        // El "grid" define los márgenes del gráfico para que no se corten los textos
                        grid: { top: '25%', left: '3%', right: '10%', bottom: '5%', containLabel: true }
                    }
                },
                {
                    query: { maxWidth: 499 },
                    option: {
                    title: { show: false }, 
                    graphic: { elements: [] },
                    grid: { top: '5%', left: '2%', right: '12%', bottom: '2%', containLabel: true } 
                    }
                }
            ]
        };
        option && myChart.setOption(option);
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
