<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personas en Estado de Vulnerabilidad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIABLES CSS PARA TEMAS
           ========================================= */
        :root {
            /* Modo Claro */
            --body-bg: #f4f7fb; 
            --bg-glow: radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.08) 0%, transparent 50%), 
                       radial-gradient(circle at 100% 0%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
            
            --card-bg: rgba(255, 255, 255, 0.85); 
            --header-bg: rgba(255, 255, 255, 0.75);
            --primary-text: #0f172a;
            --secondary-text: #64748b;
            --card-title-text: #1e293b;
            
            --accent-color: #06b6d4; 
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #06b6d4); 
            
            --iframe-placeholder-bg: rgba(248, 250, 252, 0.8);
            --border-color: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            --card-hover-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            
            --border-radius: 16px;
            --grid-gap: 24px;
            --main-max-width: 1350px;
        }

        body.dark-mode {
            /* Modo Oscuro */
            --body-bg: #090e17; 
            --bg-glow: radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 45%), 
                       radial-gradient(circle at 100% 0%, rgba(6, 182, 212, 0.15) 0%, transparent 45%);
            
            --card-bg: rgba(30, 41, 59, 0.65); 
            --header-bg: rgba(15, 23, 42, 0.75);
            --primary-text: #f8fafc;
            --secondary-text: #94a3b8;
            --card-title-text: #e2e8f0;
            
            --accent-color: #22d3ee; 
            --accent-gradient: linear-gradient(135deg, #a78bfa, #22d3ee);
            
            --iframe-placeholder-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(51, 65, 85, 0.6);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --card-hover-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--body-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary-text); }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--body-bg);
            background-image: var(--bg-glow);
            background-attachment: fixed; 
            margin: 0;
            color: var(--primary-text);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
           ENCABEZADO
           ========================================= */
        .encabezado {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: background-color 0.4s ease, border-bottom 0.4s ease;
        }

        .header-content {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            max-width: var(--main-max-width);
            margin: 0 auto;
        }

        .header-left { display: flex; justify-content: flex-start; }
        .header-center { text-align: center; display: flex; flex-direction: column; }
        .header-right { display: flex; justify-content: flex-end; align-items: center; gap: 24px; }

        .logo-left, .logo-right {
            height: 45px; width: auto; object-fit: contain;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.05));
        }

        .header-center h1 {
            margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -0.5px;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .header-center p {
            color: var(--secondary-text); margin: 4px 0 0 0;
            font-size: 15px; font-weight: 500; letter-spacing: 0.2px;
        }

        .btn-theme-toggle {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--primary-text); display: flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 50%; padding: 0;
            box-shadow: var(--card-shadow); cursor: pointer; backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-theme-toggle:hover { 
            border-color: var(--accent-color); color: var(--accent-color); 
            transform: translateY(-2px) scale(1.05); box-shadow: var(--card-hover-shadow);
        }

        /* =========================================
           CUADRÍCULA Y TARJETAS
           ========================================= */
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: var(--grid-gap); max-width: var(--main-max-width);
            margin: 0 auto; padding: 0 20px 60px;
        }

        .mapa-completo { grid-column: 1 / -1; }

        .tarjeta {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: var(--border-radius); padding: 28px;
            box-shadow: var(--card-shadow); display: flex; flex-direction: column;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.4s ease, border-color 0.4s ease;
            animation: fadeIn 0.6s ease-out forwards; opacity: 0;
            position: relative;
        }

        .tarjeta:hover {
            transform: translateY(-5px); box-shadow: var(--card-hover-shadow);
            border-color: rgba(6, 182, 212, 0.3);
        }

        .tarjeta:nth-child(1) { animation-delay: 0.1s; }
        .tarjeta:nth-child(2) { animation-delay: 0.2s; }
        .tarjeta:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; position: relative;
        }

        .titulo-tarjeta {
            font-size: 17px; font-weight: 700; color: var(--card-title-text);
            text-transform: uppercase; letter-spacing: 0.8px;
            display: flex; align-items: center; gap: 12px;
        }

        /* Línea debajo del título */
        .card-header::after {
            content: ''; position: absolute; bottom: -10px; left: 0;
            width: 35px; height: 3px; background: var(--accent-gradient); border-radius: 4px;
        }

        .titulo-icon {
            font-size: 20px; background-color: var(--iframe-placeholder-bg);
            padding: 8px; border-radius: 8px; border: 1px solid var(--border-color);
        }

        /* Botón de expandir (Integrado de tu código) */
        .btn-expand {
            background: var(--iframe-placeholder-bg); border: 1px solid var(--border-color);
            color: var(--secondary-text); border-radius: 8px; width: 36px; height: 36px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-expand:hover {
            background: var(--accent-color); color: white; border-color: var(--accent-color);
            transform: scale(1.1); box-shadow: 0 4px 10px rgba(6, 182, 212, 0.3);
        }

        iframe {
            width: 100%; border: 1px solid var(--border-color); border-radius: 12px;
            background-color: var(--iframe-placeholder-bg);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .iframe-alto { height: 550px; }
        .iframe-medio { height: 420px; }

        /* =========================================
           MODAL LIGHTBOX (Adaptado a Glassmorphism)
           ========================================= */
        body.modal-open { overflow: hidden; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; 
            background: rgba(15, 23, 42, 0.65); /* Fondo muy oscuro */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); /* Efecto cristal */
            z-index: 9999; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; padding: 20px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            width: 100%; max-width: 1250px; height: 90%; 
            background: var(--card-bg); /* Toma el color de la tarjeta clara u oscura */
            border: 1px solid var(--border-color);
            border-radius: 20px; position: relative; padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            transform: scale(0.95) translateY(20px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        
        .modal-close {
            position: absolute; top: -15px; right: -15px; 
            background: var(--card-bg); color: var(--primary-text);
            border: 2px solid var(--border-color); border-radius: 50%; 
            width: 44px; height: 44px; font-size: 1.5rem; font-weight: bold; 
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; 
            transition: all 0.3s ease;
        }
        .modal-close:hover { 
            background: var(--accent-color); color: white; border-color: var(--accent-color);
            transform: rotate(90deg) scale(1.1); 
        }
        
        .modal-body { 
            flex-grow: 1; width: 100%; height: 100%; overflow: hidden; 
            border-radius: 12px; -webkit-overflow-scrolling: touch; 
        }
        .modal-body iframe, .modal-body img { 
            width: 100%; height: 100%; border: none; object-fit: contain; 
            border-radius: 12px; background-color: var(--iframe-placeholder-bg);
        }

        /* =========================================
           RESPONSIVE (MÓVILES)
           ========================================= */
        @media (max-width: 900px) {
            .encabezado { padding: 15px 20px; }
            .header-content { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 15px; }
            .header-left { justify-content: flex-start; order: 1; }
            .header-right { justify-content: flex-end; order: 2; gap: 15px;}
            .header-center { grid-column: 1 / -1; order: 3; text-align: center; margin-top: 5px; }
            .header-center h1 { font-size: 28px; }
            .dashboard-grid { grid-template-columns: 1fr; padding: 0 15px 40px; gap: 20px; }
            .tarjeta { padding: 20px; }
            .iframe-alto { height: 400px; }
            .iframe-medio { height: 350px; }
            .modal-overlay { padding: 10px; }
            .modal-content { height: 95%; border-radius: 16px; padding: 15px; }
            .modal-close { top: -10px; right: -10px; width: 38px; height: 38px; }
        }
    </style>
</head>
<body>

    <header class="encabezado">
        <div class="header-content">
            <div class="header-left">
                <img src="https://i.imgur.com/GXTFolo.png" alt="Logo Institución" class="logo-left">
            </div>
            <div class="header-center">
                <h1>Personas en Estado de Vulnerabilidad</h1>
                <p>Analisis Situacional</p>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="btn-theme-toggle" aria-label="Cambiar tema" title="Modo Claro / Oscuro">
                    <svg id="icon-sun" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <img src="https://i.imgur.com/W5Mo4rc.png" alt="Logo Entidad" class="logo-right">
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <!-- Tarjeta 1: Mapa -->
        <div class="tarjeta mapa-completo">
            <div class="card-header">
                <div class="titulo-tarjeta">
                    <span class="titulo-icon">🗺️</span> Mapa Interactivo
                </div>
                <!-- Botón Expandir agregado aquí -->
                <button class="btn-expand" onclick="abrirModal('graficos/mapa.html')" aria-label="Expandir" title="Ver en pantalla completa">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <iframe class="iframe-alto" src="graficos/mapa.html" title="Mapa de Incidentes"></iframe>
        </div>

        <!-- Tarjeta 2: Perfil Demográfico -->
        <div class="tarjeta">
            <div class="card-header">
                <div class="titulo-tarjeta">
                    <span class="titulo-icon">📊</span> Perfil Demográfico
                </div>
                <!-- Botón Expandir agregado aquí -->
                <button class="btn-expand" onclick="abrirModal('graficos/grafico_sexo.html')" aria-label="Expandir" title="Ver en pantalla completa">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <iframe class="iframe-medio" src="graficos/grafico_sexo.html" title="Distribución por Sexo"></iframe>
        </div>

        <!-- Tarjeta 3: Tercer Gráfico -->
        <div class="tarjeta">
            <div class="card-header">
                <div class="titulo-tarjeta">
                    <span class="titulo-icon">📈</span> Tendencias y Métricas
                </div>
                <!-- Botón Expandir agregado aquí -->
                <button class="btn-expand" onclick="abrirModal('graficos/tercer_grafico.html')" aria-label="Expandir" title="Ver en pantalla completa">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <iframe class="iframe-medio" src="graficos/tercer_grafico.html" title="Tercer Gráfico"></iframe>
        </div>
    </main>

    <!-- ESTRUCTURA DEL MODAL LIGHTBOX (Agregada de tu código anterior) -->
    <div class="modal-overlay" id="lightbox-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar modal">×</button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // --- CONTROL DEL TEMA CLARO/OSCURO ---
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');

        function updateIcons() {
            if (body.classList.contains('dark-mode')) {
                iconSun.style.display = 'block';
                iconMoon.style.display = 'none';
            } else {
                iconSun.style.display = 'none';
                iconMoon.style.display = 'block';
            }
        }

        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            body.classList.add('dark-mode');
        }
        updateIcons();

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            updateIcons();
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        // --- CONTROL DEL MODAL LIGHTBOX (Adaptado de tu código) ---
        function abrirModal(ruta, esImagen = false) {
            const modal = document.getElementById('lightbox-modal');
            const modalBody = document.getElementById('modal-body');
            
            // Bloqueamos el scroll de la página de fondo
            document.body.classList.add('modal-open');
            
            if (esImagen) {
                modalBody.innerHTML = `<img src="${ruta}" alt="Gráfico ampliado">`;
            } else {
                // Se carga el iframe
                modalBody.innerHTML = `<iframe src="${ruta}"></iframe>`;
            }
            
            modal.style.display = 'flex';
            // Pequeño retardo para que la animación CSS "scale" funcione
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function cerrarModal() {
            const modal = document.getElementById('lightbox-modal');
            modal.classList.remove('active');
            
            // Liberamos el scroll de la página
            document.body.classList.remove('modal-open');
            
            setTimeout(() => {
                modal.style.display = 'none';
                document.getElementById('modal-body').innerHTML = ''; // Limpiamos el iframe
            }, 300); // 300ms coincide con la transición CSS
        }

        // Cerrar el modal al hacer click fuera de la ventana blanca/oscura (en el fondo borroso)
        document.getElementById('lightbox-modal').addEventListener('click', function(e) {
            if(e.target === this) cerrarModal();
        });
    </script>
</body>
</html>
